 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Player</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
  <h1 id="title">
    <i class="fa-solid fa-film"></i>
    Video <span>Player</span>
  </h1>

  <p id="intro">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    Upload and play your videos instantly
  </p>
</header>

<!-- UPLOAD -->
<div class="upload-box">
  <span>
    <i class="fa-solid fa-folder-open"></i>
    Choose Video
  </span>

  <input type="file" id="file" accept="video/mp4" hidden>

  <button class="btn">
    <i class="fa-solid fa-upload"></i>
  </button>
</div>

<!-- VIDEO -->
<div class="player-box">
  <video id="player" controls></video>
</div>

<!-- HOW -->
<a class="how" href="#">
  <i class="fa-solid fa-circle-question"></i>
  How to use
  <i class="fa-solid fa-arrow-right"></i>
</a>

<!-- CDN INFO -->
<section class="cdn">

  <h2>
    <i class="fa-solid fa-link"></i>
    CDN Links
  </h2>

  <div class="card">
    <label>
      <i class="fa-brands fa-js"></i> JS
    </label>
    <input value="https://cdn.jsdelivr.net/gh/your-repo/Videoplayer.js" readonly>
    <i class="fa-regular fa-copy"></i>
  </div>

  <div class="card">
    <label>
      <i class="fa-brands fa-css3-alt"></i> CSS
    </label>
    <input value="https://cdn.jsdelivr.net/gh/your-repo/player.css" readonly>
    <i class="fa-regular fa-copy"></i>
  </div>

</section>

<footer>
  <i class="fa-regular fa-copyright"></i>
  Made by <b>Pantheon Coder</b>
</footer>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
const player = new Plyr('#player');

const fileInput = document.getElementById('file');
const uploadBtn = document.querySelector('.btn');
const video = document.getElementById('player');

video.style.display = "none";

uploadBtn.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', function () {
  const file = this.files[0];

  if (file) {
    const url = URL.createObjectURL(file);

    video.src = url;
    video.load();
    video.style.display = "block";

    video.addEventListener('loadedmetadata', () => {
      player.play().catch(() => {});
    }, { once: true });
  }
});
</script>

</body>
</html>
